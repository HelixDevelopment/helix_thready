# ─────────────────────────────────────────────────────────────────────────────
# Docs Chain context — Helix Thready public documentation (MVP research tree)
# ─────────────────────────────────────────────────────────────────────────────
#
# Authority : [CONSTITUTION §11.4.65] (every non-source .md has PDF + HTML
#             siblings, kept in sync) + [CONSTITUTION §11.4.106] (Docs Chain).
# Schema    : vasic-digital/docs_chain — .docs_chain/contexts/<name>.yaml
#             (docs/CONFIG_SCHEMA.md, rev 3 — parsed + validated by internal/config).
# Engine    : `docs_chain sync thready-docs`  (or `docs_chain sync --all`) —
#             content-hashed incremental recompute over the DAG below.
#
# Pipeline (per doc): markdown --md2html--> html --html2pdf--> pdf
#   • md2html  runs scripts/export-docs.sh in single-file --mode md2html:
#       preprocesses inline ```mermaid fences (mmdc -> inline <svg>) then
#       pandoc --standalone --toc --css assets/doc.css --metadata title=<H1>.
#   • html2pdf runs scripts/export-docs.sh in single-file --mode html2pdf:
#       weasyprint html -> pdf (branded running header/footer via doc.css).
#   Both modes share the SAME code paths as the bulk `export-docs.sh` run, so
#   Docs-Chain-driven and bulk-driven output are byte-identical.
#
# exec contract [CONFIG_SCHEMA §5.2]: Docs Chain invokes
#     <exec> <input> <output> <args…>
#   so `--mode <x>` (below) arrives AFTER the input/output paths the engine
#   supplies. The transform reads only <input>, writes only <output>, exit 0/≠0.
#
# NOTE on determinism [CONFIG_SCHEMA §5.2 / §11.4.50]: pandoc + weasyprint
#   output is byte-stable for identical input. The mermaid step (mmdc) is
#   deterministic per diagram content here (mermaid-cli 11.16.0, one diagram
#   per invocation). If a future mermaid-cli emits randomised element ids and
#   the engine reports false drift, pin mmdc or normalise svg ids in md2html.
#
# Enumerates every *.md under docs/public/research/mvp/ (96 docs
# -> 288 nodes, 192 derive-from edges).
# ─────────────────────────────────────────────────────────────────────────────

