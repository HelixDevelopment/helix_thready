<?xml version="1.0" encoding="UTF-8"?>
<!-- Helix Thready — footer slogan lockup: "Made with <heart> by Helix Development".
     Heart = lucide Heart glyph in the brand colour (ds-heart = accent #446E12; see
     brand-assets.md §8, [OPEN: THREADY-DES-03] love-red alternative). Accessible name of the
     heart is "love" so the lockup reads "Made with love by Helix Development". Text is
     theme-aware (muted). Transparent background. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 44" width="560" height="44" role="img" aria-label="Made with love by Helix Development">
  <style>
    .sl { fill: #475569; font-family: "Hanken Grotesk Variable", "Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;
          font-weight: 500; font-size: 26px; }
    .heart { fill: #446E12; }               /* --ds-heart = --accent (light) */
    @media (prefers-color-scheme: dark) {
      .sl { fill: #94A3B8; }
      .heart { fill: #B6E376; }             /* --ds-heart = --accent (dark) — stays legible on #020817 */
    }
  </style>
  <text class="sl" x="0" y="31">Made with</text>
  <!-- lucide Heart, brand colour ds-heart (=accent); aria-hidden (meaning carried by the lockup aria-label) -->
  <g class="heart" transform="translate(146,8) scale(1.16)" aria-hidden="true">
    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
  </g>
  <text class="sl" x="182" y="31">by Helix Development</text>
</svg>
