<?xml version="1.0" encoding="UTF-8"?>
<!--
  Title           : Helix Thready - sync-static.svg (reduced-motion fallback)
  Classification  : PUBLIC
  Location        : docs/public/research/mvp/design/motion/sync-static.svg
  Status          : Active - v1.0 | Revision : 1 (2026-07-22)
  Author          : Helix Thready documentation swarm (design/motion)
  Derivation      : thread-sync.json frozen at posterFrame 30 (motion-manifest.json:
                    reducedMotion "freeze-poster"), values read from the Lottie
                    keyframes: both nodes at rest scale 100 (r 32, stroke 10, center dot
                    r 10, at 96,128 and 416,128); thread at 45% stroke opacity; carrier
                    dot-a (r 14) at x 365.78 - the token ease cubic-bezier(0.2,0,0,1)
                    evaluated at frame 30 of its 0-55 travel (120 to 392) - at full
                    opacity; return dot-b has opacity 0 at frame 30 and is omitted.
                    Closes THREADY-MOT-03 (asset half).
  Coloring        : literal Thready token values as fallbacks (matches the Lottie's
                    baked colors - motion.md par.6); the CSS custom-property hooks (brand,
                    brand-2) apply when inlined [DEFAULT - adjustable].
-->
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 512 256" width="512" height="256" role="img" aria-labelledby="t">
  <title id="t">Syncing (static thread)</title>
  <desc>Static poster frame of the thread-sync Lottie: messenger node and Thready node joined by a thread, with the carrier dot frozen near arrival. Shown when prefers-reduced-motion is active; sync progress is conveyed by the counter text.</desc>
  <!-- thread (teal, 45% stroke opacity) -->
  <path d="M 132 128 L 380 128" fill="none" style="stroke:var(--brand-2,#ABDDC9)"
        stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <!-- node-left (messenger, teal), scale 100% -->
  <circle cx="96" cy="128" r="32" fill="none" style="stroke:var(--brand-2,#ABDDC9)" stroke-width="10"/>
  <circle cx="96" cy="128" r="10" style="fill:var(--brand-2,#ABDDC9)"/>
  <!-- node-right (thready, lime), scale 100% -->
  <circle cx="416" cy="128" r="32" fill="none" style="stroke:var(--brand,#B6E376)" stroke-width="10"/>
  <circle cx="416" cy="128" r="10" style="fill:var(--brand,#B6E376)"/>
  <!-- dot-a (lime carrier), frame-30 position on its eased 0-55f travel -->
  <circle cx="365.78" cy="128" r="14" style="fill:var(--brand,#B6E376)"/>
</svg>
