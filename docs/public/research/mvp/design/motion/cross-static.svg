<?xml version="1.0" encoding="UTF-8"?>
<!--
  Title           : Helix Thready - cross-static.svg (reduced-motion fallback)
  Classification  : PUBLIC
  Location        : docs/public/research/mvp/design/motion/cross-static.svg
  Status          : Active - v1.0 | Revision : 1 (2026-07-22)
  Author          : Helix Thready documentation swarm (design/motion)
  Derivation      : error-cross.json at its final frame 89 (motion-manifest.json:
                    reducedMotion "final-frame"): disc back at rest (shake keyframes end
                    at 256,256 by frame 78, scale 100), both cross arms fully drawn -
                    the Lottie's own segments (-58,-58)-(58,58) and (58,-58)-(-58,58)
                    offset by the disc position. The danger ring ping has opacity 0 at
                    frame 89 and is therefore omitted. Closes THREADY-MOT-03 (asset half).
  Coloring        : disc binds the danger custom property with the Lottie literal as fallback
                    [DEFAULT - adjustable]; error is semantic - never brand-colored,
                    never white-labeled (design-system par.6, motion.md par.6). The snow
                    cross strokes stay literal #F8FAFC by design: they must remain
                    light-on-danger in both themes and no on-danger token exists.
-->
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="t">
  <title id="t">Error (cross drawn)</title>
  <desc>Static final frame of the error-cross Lottie: danger disc with the snow cross fully drawn, no shake. Shown when prefers-reduced-motion is active; the error text always carries the meaning.</desc>
  <!-- disc (danger), final position 256,256 scale 100% -->
  <circle cx="256" cy="256" r="180" style="fill:var(--danger,#DC2626)"/>
  <!-- cross arms (snow), trim-paths complete -->
  <path d="M 198 198 L 314 314" fill="none" stroke="#F8FAFC" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 314 198 L 198 314" fill="none" stroke="#F8FAFC" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
