<!--
  Title           : Helix Thready - spiral-static.svg (reduced-motion fallback)
  Classification  : PUBLIC
  Location        : docs/public/research/mvp/design/motion/spiral-static.svg
  Status          : Active - v1.0 | Revision : 1 (2026-07-22)
  Author          : Helix Thready documentation swarm (design/motion)
  Derivation      : helix-spinner.json frozen at posterFrame 15 (motion-manifest.json:
                    reducedMotion "freeze-poster"). Strand paths are the exact 50/50
                    interpolation of the t=12/t=18 shape keyframes (their easing is
                    linear), strand opacities are the token ease cubic-bezier(0.2,0,0,1)
                    evaluated at the same frame. Geometry is NOT redrawn - it is the
                    Lottie's own vertex/tangent data. Closes THREADY-MOT-03 (asset half).
  Coloring        : literal Thready token values as fallbacks (matches the Lottie's
                    baked colors, dark-surface tuned - motion.md par.6); the CSS custom-property hooks (brand,
                    brand-2) apply when inlined [DEFAULT - adjustable].
-->
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="t">
  <title id="t">Loading (static helix mark)</title>
  <desc>Static double-helix mark: the helix-spinner Lottie frozen at its poster frame. Shown when prefers-reduced-motion is active; the wait state itself is conveyed by accompanying text.</desc>
  <!-- strand-back (teal) - layer opacity 96.335% at frame 15 -->
  <path d="M 96.0 188.954 C 122.667 224.059 149.333 287.942 176.0 323.047 C 202.667 358.152 229.333 358.152 256.0 323.047 C 282.667 287.942 309.333 224.059 336.0 188.954 C 362.667 153.849 389.333 153.849 416.0 188.954"
        fill="none" style="stroke:var(--brand-2,#ABDDC9)" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9634"/>
  <!-- strand-front (lime) - layer opacity 73.665% at frame 15 -->
  <path d="M 96.0 323.047 C 122.667 287.942 149.333 224.059 176.0 188.954 C 202.667 153.849 229.333 153.849 256.0 188.954 C 282.667 224.059 309.333 287.942 336.0 323.047 C 362.667 358.152 389.333 358.152 416.0 323.047"
        fill="none" style="stroke:var(--brand,#B6E376)" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.7367"/>
</svg>
