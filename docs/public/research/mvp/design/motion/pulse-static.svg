<?xml version="1.0" encoding="UTF-8"?>
<!--
  Title           : Helix Thready - pulse-static.svg (reduced-motion fallback)
  Classification  : PUBLIC
  Location        : docs/public/research/mvp/design/motion/pulse-static.svg
  Status          : Active - v1.0 | Revision : 1 (2026-07-22)
  Author          : Helix Thready documentation swarm (design/motion)
  Derivation      : processing-pulse.json frozen at posterFrame 30 (motion-manifest.json:
                    reducedMotion "freeze-poster"), values read from the Lottie keyframes:
                    core at its keyframed scale 114 (r 48*1.14 = 54.72); ring A at linear
                    scale 140 (r 67.2, stroke 12*1.4 = 16.8) and opacity 45.833%; ring B
                    at linear scale 220 (r 105.6, stroke 26.4) and opacity 15.5%. The
                    frame-30 render truly contains BOTH rings (B faint) - this file
                    matches the renderer, not the "one faint ring" prose shorthand of
                    motion.md par.5. Closes THREADY-MOT-03 (asset half).
  Coloring        : literal Thready token values as fallbacks (matches the Lottie's
                    baked colors - motion.md par.6); the CSS custom-property hooks (brand,
                    brand-2) apply when inlined [DEFAULT - adjustable].
-->
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="t">
  <title id="t">Processing (static pulse)</title>
  <desc>Static poster frame of the processing-pulse Lottie: lime core with two teal ripple rings frozen mid-expansion. Shown when prefers-reduced-motion is active; progress is conveyed by the step label or percentage text.</desc>
  <!-- ring-b (teal-dark), scale 220% opacity 15.5% at frame 30 -->
  <circle cx="256" cy="256" r="105.6" fill="none" style="stroke:var(--brand-2,#B7EBD6)"
          stroke-width="26.4" opacity="0.155"/>
  <!-- ring-a (teal), scale 140% opacity 45.833% at frame 30 -->
  <circle cx="256" cy="256" r="67.2" fill="none" style="stroke:var(--brand-2,#ABDDC9)"
          stroke-width="16.8" opacity="0.4583"/>
  <!-- core (lime), keyframed scale 114% at frame 30 -->
  <circle cx="256" cy="256" r="54.72" style="fill:var(--brand,#B6E376)"/>
</svg>
