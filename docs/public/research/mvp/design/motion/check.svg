<?xml version="1.0" encoding="UTF-8"?>
<!--
  Title           : Helix Thready - check.svg (reduced-motion fallback)
  Classification  : PUBLIC
  Location        : docs/public/research/mvp/design/motion/check.svg
  Status          : Active - v1.0 | Revision : 1 (2026-07-22)
  Author          : Helix Thready documentation swarm (design/motion)
  Derivation      : success-check.json at its final frame 89 (motion-manifest.json:
                    reducedMotion "final-frame"): disc at rest scale 100 (r 180 at
                    256,256), check trim-path fully drawn - the Lottie's own polyline
                    (-76,8)-(-20,64)-(86,-56) offset by the disc position. The accent
                    ring ping has opacity 0 at frame 89 and is therefore omitted.
                    Closes THREADY-MOT-03 (asset half).
  Coloring        : literal Thready token values as fallbacks (matches the Lottie's
                    baked colors - motion.md par.6); the CSS custom-property hooks (brand,
                    brand-ink) apply when inlined [DEFAULT - adjustable]. Check ink on lime is the
                    documented 13.15:1 brand-ink pairing (design-system par.3.2).
-->
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="t">
  <title id="t">Success (check drawn)</title>
  <desc>Static final frame of the success-check Lottie: lime disc with the ink check fully drawn. Shown when prefers-reduced-motion is active.</desc>
  <!-- disc (lime), final scale 100% -->
  <circle cx="256" cy="256" r="180" style="fill:var(--brand,#B6E376)"/>
  <!-- check (brand-ink), trim-path complete -->
  <path d="M 180 264 L 236 320 L 342 200"
        fill="none" style="stroke:var(--brand-ink,#0A0F04)" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
