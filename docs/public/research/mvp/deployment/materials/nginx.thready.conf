# =============================================================================
# Helix Thready — Edge reverse proxy: NGINX ALTERNATIVE to the Caddyfile
# Location : /home/thready/edge/nginx.thready.conf   (if running nginx instead of Caddy)
# Source   : materialized from environments.md §4 (nginx is the [DEFAULT — adjustable] alternative;
#            its lets_encrypt reload command is `nginx -s reload`).
#
# Use EITHER this file (nginx) OR the Caddyfile (Caddy) — never both; only one process may bind 80/443.
# If you switch the edge to nginx, set in each env's lets_encrypt.conf:
#     LE_RELOAD_CMD="podman exec thready-edge-nginx nginx -s reload"     # rootless reload idiom
# and mount this file + the same /certs and /var/www/acme paths into an nginx:1.27-alpine container.
#
# TLS: same model as the Caddyfile — certificates are managed by vasic-digital/lets_encrypt
#      (per-subdomain cert, atomic install + risk-free rollback, tls-lets-encrypt.md §7). nginx only
#      *serves* the installed cert/key paths; it does NOT run its own ACME client.
#
# Routing: dev.->127.0.0.1:60443  sta.->127.0.0.1:61443  apex->127.0.0.1:62443
#          (VERIFIED port_prefix mapping of internal 8443, service-discovery-ports.md §4).
# NOTE: HTTP/3 (listen ... quic) requires an nginx built with the HTTP/3 module (nginx >= 1.25); if the
#       image lacks it, drop the `quic`/`http3` lines and serve HTTP/2 only. The upstream API speaks TLS
#       on 8443, so we proxy over https to loopback and skip upstream cert verification (loopback trust).
# =============================================================================

# ---- Port 80: ACME HTTP-01 webroot + redirect everything else to HTTPS ------
server {
    listen 80;
    listen [::]:80;
    server_name dev.thready.hxd3v.com sta.thready.hxd3v.com thready.hxd3v.com;

    # Shared ACME webroot where lets_encrypt/acme.sh writes HTTP-01 challenge tokens.
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type "text/plain";
        try_files $uri =404;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- Reusable proxy settings ------------------------------------------------
# (kept in a snippet-style block; inline per-server to avoid include-path assumptions)

# ---- Development ------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic reuseport;                 # HTTP/3 (QUIC on udp/443); remove if unsupported
    http2 on;
    server_name dev.thready.hxd3v.com;

    ssl_certificate     /certs/dev/fullchain.pem;   # installed by lets_encrypt deploy-hook
    ssl_certificate_key /certs/dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    location / {
        proxy_pass https://127.0.0.1:60443;
        proxy_ssl_verify off;                  # loopback upstream; trust the local API cert
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # WebSocket / SSE hub upgrade support (thready-api /v1 WS+SSE)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}

