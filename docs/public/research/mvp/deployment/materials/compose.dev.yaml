# =============================================================================
# Helix Thready — DEVELOPMENT rootless Podman Compose stack
# Location : /home/thready/dev/compose.dev.yaml   (deploy target)
# Source   : materialized from compose-files.md §4/§5 — the SAME template as prod with the dev deltas:
#            name: thready-dev · port_prefix band 60 · ~1/3 resource limits · 8 BG workers · 5d Prom retention.
#            dev issues certs against the LE staging CA first (LE_STAGING=1) then flips to 0 (environments.md §5).
# Project  : thready-dev   (disjoint namespace + disjoint 60xxx port band — cannot collide with sta/prod)
# Runtime  : ROOTLESS podman-compose only  [CONSTITUTION §11.4.76/161]
# Ports    : DYNAMIC via port_prefix band 60 — ${PP_<internal>:-<60-default>} (VERIFIED plan, service-discovery-ports.md §4).
# Secrets  : every credential injected from ./.env (chmod 600) — NEVER a literal.
# NO-BLUFF : the five `profiles: [buildnew]` services are SCAFFOLD placeholders (images not built) — a
#            default `up` never starts them; do not claim they work.
# =============================================================================
name: thready-dev

x-restart: &restart unless-stopped
x-logging: &logging
  driver: json-file
  options: { max-size: "50m", max-file: "5" }

services:

  # ------------------------------------------------------------------ data plane
  thready-postgres:
    image: docker.io/pgvector/pgvector:pg17
    env_file: ./.env
    environment:
      POSTGRES_USER: ${THREADY_PG_USER}
      POSTGRES_PASSWORD: ${THREADY_PG_PASSWORD}
      POSTGRES_DB: thready
    command: >
      postgres -c wal_level=replica -c archive_mode=on
               -c archive_command='rclone copyto %p thready-secondary:wal/dev/%f'
               -c archive_timeout=3600 -c max_wal_senders=3
    ports: ["127.0.0.1:${PP_5432:-60432}:5432"]
    volumes:
      - thready-dev-pgdata:/var/lib/postgresql/data:Z
      - thready-dev-pgwal:/var/lib/postgresql/wal:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d thready"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy: { resources: { limits: { cpus: "2.0", memory: 8g }, reservations: { memory: 2g } } }
    pids_limit: 512
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  thready-redis:
    image: docker.io/library/redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports: ["127.0.0.1:${PP_6379:-60379}:6379"]
    volumes: ["thready-dev-redis:/data:Z"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy: { resources: { limits: { cpus: "0.5", memory: 768m } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  thready-nats:
    image: docker.io/library/nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "127.0.0.1:${PP_4222:-60222}:4222"
      - "127.0.0.1:${PP_8222:-60223}:8222"           # collision probe → ...223
    volumes: ["thready-dev-nats:/data:Z"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy: { resources: { limits: { cpus: "0.75", memory: 1536m } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  thready-minio:
    image: docker.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    env_file: ./.env
    environment:
      MINIO_ROOT_USER: ${THREADY_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${THREADY_MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${PP_9000:-60000}:9000"
      - "127.0.0.1:${PP_9001:-60001}:9001"
    volumes: ["thready-dev-minio:/data:Z"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy: { resources: { limits: { cpus: "0.75", memory: 1536m } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  thready-clickhouse:
    image: docker.io/clickhouse/clickhouse-server:24-alpine
    ports:
      - "127.0.0.1:${PP_8123:-60123}:8123"
      - "127.0.0.1:${PP_9009:-60009}:9009"
    volumes: ["thready-dev-clickhouse:/var/lib/clickhouse:Z"]
    ulimits: { nofile: { soft: 262144, hard: 262144 } }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy: { resources: { limits: { cpus: "0.75", memory: 1536m } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  # ---------------------------------------------------- application plane (FOUNDATION)
  thready-api:
    image: localhost/thready-api:${THREADY_VERSION}
    env_file: ./.env
    depends_on: [thready-postgres, thready-redis, thready-nats, thready-minio]
    ports: ["127.0.0.1:${PP_8443:-60443}:8443"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8443/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy: { resources: { limits: { cpus: "1.0", memory: 1g } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  thready-web:
    image: localhost/thready-web:${THREADY_VERSION}
    depends_on: [thready-api]
    ports: ["127.0.0.1:${PP_8088:-60088}:8088"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy: { resources: { limits: { cpus: "0.25", memory: 128m } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  thready-herald:
    image: localhost/thready-herald:${THREADY_VERSION}
    env_file: ./.env
    depends_on: [thready-postgres, thready-nats]
    ports: ["127.0.0.1:${PP_7080:-60080}:7080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy: { resources: { limits: { cpus: "0.5", memory: 512m } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  thready-processing:
    image: localhost/thready-processing:${THREADY_VERSION}
    env_file: ./.env
    environment:
      HELIX_EMBEDDING_PROVIDER: ${HELIX_EMBEDDING_PROVIDER}   # GAP #1 — MUST be "llama"
      HELIX_LLM_BASE_URL: ${HELIX_LLM_BASE_URL}
      THREADY_BG_WORKERS: "8"                                  # dev worker count
    depends_on: [thready-postgres, thready-nats, thready-redis]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy: { resources: { limits: { cpus: "1.5", memory: 3g } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  # ---------------------------------------------------- 3rd-party download workers
  boba:
    image: localhost/boba:${BOBA_VERSION}
    ports: ["127.0.0.1:${PP_8000:-60002}:8000"]     # collision probe → ...002
    volumes: ["thready-dev-boba:/downloads:Z"]
    deploy: { resources: { limits: { cpus: "0.5", memory: 512m } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  metube:
    image: localhost/metube:${METUBE_VERSION}
    ports: ["127.0.0.1:${PP_8091:-60091}:8091"]
    volumes: ["thready-dev-metube:/downloads:Z"]
    deploy: { resources: { limits: { cpus: "0.5", memory: 512m } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  # ---------------------------------------------------- observability (per env)
  thready-prometheus:
    image: docker.io/prom/prometheus:v2.50.0
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=5d"]
    ports: ["127.0.0.1:${PP_9090:-60090}:9090"]
    volumes:
      - ./config/prometheus:/etc/prometheus:ro,Z
      - thready-dev-prometheus:/prometheus:Z
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy: { resources: { limits: { cpus: "0.5", memory: 1g } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  thready-grafana:
    image: docker.io/grafana/grafana:10.4.0
    env_file: ./.env
    environment:
      GF_SECURITY_ADMIN_USER: ${THREADY_GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${THREADY_GRAFANA_ADMIN_PASSWORD}
    depends_on: [thready-prometheus]
    ports: ["127.0.0.1:${PP_3000:-60003}:3000"]     # collision probe → ...003
    volumes: ["thready-dev-grafana:/var/lib/grafana:Z"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy: { resources: { limits: { cpus: "0.25", memory: 256m } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  thready-jaeger:
    image: docker.io/jaegertracing/all-in-one:1.55
    environment: { COLLECTOR_OTLP_ENABLED: "true" }
    ports:
      - "127.0.0.1:${PP_16686:-60686}:16686"
      - "127.0.0.1:${PP_4317:-60317}:4317"
    deploy: { resources: { limits: { cpus: "0.25", memory: 512m } } }
    logging: *logging
    restart: *restart
    networks: [thready-dev-net]

  # ------------------------------------------ BUILD-NEW placeholders (SCAFFOLD — kept OUT of default `up`)
  thready-assetsvc:
    image: localhost/thready-assetsvc:${THREADY_VERSION}
    profiles: ["buildnew"]                           # [GAP: #9/#20]
    env_file: ./.env
    depends_on: [thready-minio, thready-postgres]
    ports: ["127.0.0.1:${PP_8081:-60081}:8081"]
    networks: [thready-dev-net]
  thready-downloadmgr:
    image: localhost/thready-downloadmgr:${THREADY_VERSION}
    profiles: ["buildnew"]                           # [GAP: #4/#20]
    env_file: ./.env
    ports: ["127.0.0.1:${PP_8082:-60082}:8082"]
    networks: [thready-dev-net]
  thready-usersvc:
    image: localhost/thready-usersvc:${THREADY_VERSION}
    profiles: ["buildnew"]                           # [GAP: #20]
    env_file: ./.env
    depends_on: [thready-postgres]
    ports: ["127.0.0.1:${PP_8083:-60083}:8083"]
    networks: [thready-dev-net]
  thready-eventbus-svc:
    image: localhost/thready-eventbus-svc:${THREADY_VERSION}
    profiles: ["buildnew"]                           # [GAP: #20]
    env_file: ./.env
    depends_on: [thready-nats]
    ports: ["127.0.0.1:${PP_8084:-60084}:8084"]
    networks: [thready-dev-net]
  thready-semsearch:
    image: localhost/thready-semsearch:${THREADY_VERSION}
    profiles: ["buildnew"]                           # [GAP: #20 + #1 embedder]
    env_file: ./.env
    environment:
      HELIX_EMBEDDING_PROVIDER: ${HELIX_EMBEDDING_PROVIDER}   # GAP #1 — MUST be "llama"
      HELIX_LLM_BASE_URL: ${HELIX_LLM_BASE_URL}
    depends_on: [thready-postgres]
    ports: ["127.0.0.1:${PP_8085:-60085}:8085"]
    networks: [thready-dev-net]

networks:
  thready-dev-net:
    driver: bridge

volumes:
  thready-dev-pgdata:
  thready-dev-pgwal:
  thready-dev-redis:
  thready-dev-nats:
  thready-dev-minio:
  thready-dev-clickhouse:
  thready-dev-prometheus:
  thready-dev-grafana:
  thready-dev-boba:
  thready-dev-metube:
