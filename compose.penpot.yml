# PenPot Design Platform Stack (helix_thready)
# ---------------------------------------------------------------------------
# Local design-tooling stack for the Helix Thready project: PenPot frontend,
# backend, exporter + PostgreSQL 16 + Valkey 8 (redis-compatible KV).
#
# PROJECT INSTANTIATION (thin consumer, CONST-051(B)) of the canonical
# submodule template: ./penpot/deploy/compose.penpot.template.yml
# (vasic-digital/PenPot — see penpot/MECHANISMS.md rows 1–3, MOVED
# 2026-07-22, and penpot/deploy/README.md for the consumption pattern).
# This file carries ONLY helix_thready configuration DATA (port choice,
# paths); the mechanism lives in the submodule. Other projects MUST NOT
# copy this file — instantiate from penpot/deploy/ instead (§11.4.220(2)).
#
# This compose file is helix_thready-specific and lives at the repo root per
# CONST-051(B) decoupling — the shared vasic-digital/containers submodule
# (./containers) stays project-unaware/reusable. Pattern mirrors
# helix_track/compose.helixtrack.yml.
#
# Secrets/pins come from the gitignored ./.env.penpot (§6.R no-hardcoding):
#   PENPOT_VERSION, PENPOT_PG_USERNAME, PENPOT_PG_PASSWORD,
#   PENPOT_SECRET_KEY, PENPOT_PUBLIC_URI
#
# Usage (from the helix_thready repo root):
#   scripts/penpot_boot.sh
#   OR manually:
#     set -a; . ./.env.penpot; set +a
#     podman-compose -f compose.penpot.yml up -d
#
# Host ports: only 9001 (frontend). 9000 is taken by sonarqube; postgres and
# valkey are NOT published (5432/6379 are taken by helixcode-* containers).
#
# Resource caps follow containers/scripts/resource-policy/policy.yaml
# (*-postgres 4g; valkey 1g; browser-heavy exporter 3g/pids 4096; default 2g).

x-penpot-flags: &penpot-flags
  # Local dev instance: open registration, password login, no email loop,
  # plain-http cookies, PREPL for manage.py, telemetry off, access tokens
  # enabled for design-import automation.
  PENPOT_FLAGS: >-
    enable-registration
    enable-login-with-password
    disable-email-verification
    disable-secure-session-cookies
    enable-prepl-server
    enable-access-tokens
    disable-telemetry

services:
  penpot-frontend:
    image: docker.io/penpotapp/frontend:${PENPOT_VERSION}
    container_name: penpot-frontend
    ports:
      - "9001:8080"
    volumes:
      - penpot-assets:/opt/data/assets
      # Patched nginx template (worker_processes 8, worker_connections 4096):
      # upstream `auto` spawns 64 workers on this host whose preallocated
      # connection tables consume ~1.8GB. Extracted from the 2.17.0 image.
      - ./configs/penpot/nginx.conf.template:/tmp/nginx.conf.template:ro
    depends_on:
      - penpot-backend
      - penpot-exporter
    environment:
      <<: *penpot-flags
      PENPOT_PUBLIC_URI: ${PENPOT_PUBLIC_URI}
      PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 367001600
      PENPOT_BACKEND_URI: http://penpot-backend:6060
      PENPOT_EXPORTER_URI: http://penpot-exporter:6061
    networks:
      - penpot-net
    restart: unless-stopped
    # 2g (policy default): with upstream nginx defaults (auto → 64 workers ×
    # 65535-conn preallocated tables ≈ 1.8GB) the 1g cap made the cgroup
    # OOM-killer reap workers mid-response (browser saw ERR_EMPTY_RESPONSE —
    # observed live 2026-07-22). Fixed via the patched template above; 2g
    # keeps ample headroom. NOTE: `cpuset:` is NOT usable here — rootless
    # cgroup delegation on this host exposes no cpuset controller.
    mem_limit: 2g
    memswap_limit: 2g
    pids_limit: 1024
    oom_score_adj: 500

  penpot-backend:
    image: docker.io/penpotapp/backend:${PENPOT_VERSION}
    container_name: penpot-backend
    volumes:
      - penpot-assets:/opt/data/assets
    depends_on:
      - penpot-postgres
      - penpot-valkey
    environment:
      <<: *penpot-flags
      PENPOT_PUBLIC_URI: ${PENPOT_PUBLIC_URI}
      PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 367001600
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}
      PENPOT_DATABASE_URI: postgresql://penpot-postgres/penpot
      PENPOT_DATABASE_USERNAME: ${PENPOT_PG_USERNAME}
      PENPOT_DATABASE_PASSWORD: ${PENPOT_PG_PASSWORD}
      PENPOT_REDIS_URI: redis://penpot-valkey/0
      PENPOT_OBJECTS_STORAGE_BACKEND: fs
      PENPOT_OBJECTS_STORAGE_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: "false"
    networks:
      - penpot-net
    restart: unless-stopped
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 2048
    oom_score_adj: 500

  penpot-exporter:
    image: docker.io/penpotapp/exporter:${PENPOT_VERSION}
    container_name: penpot-exporter
    depends_on:
      - penpot-valkey
    environment:
      PENPOT_PUBLIC_URI: ${PENPOT_PUBLIC_URI}
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}
      # Internal docker-network URI the exporter's headless browser hits.
      PENPOT_INTERNAL_URI: http://penpot-frontend:8080
      PENPOT_REDIS_URI: redis://penpot-valkey/0
    networks:
      - penpot-net
    restart: unless-stopped
    # Headless Chromium: browser-class caps per resource policy.
    mem_limit: 3g
    memswap_limit: 3g
    pids_limit: 4096
    oom_score_adj: 500

  penpot-postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: penpot-postgres
    stop_signal: SIGINT
    environment:
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_DB: penpot
      POSTGRES_USER: ${PENPOT_PG_USERNAME}
      POSTGRES_PASSWORD: ${PENPOT_PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot -d penpot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - penpot-pg-data:/var/lib/postgresql/data
    networks:
      - penpot-net
    restart: unless-stopped
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 1024
    oom_score_adj: 500

  penpot-valkey:
    image: docker.io/valkey/valkey:8.1
    container_name: penpot-valkey
    environment:
      VALKEY_EXTRA_FLAGS: --maxmemory 128mb --maxmemory-policy volatile-lfu
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - penpot-net
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 1024
    oom_score_adj: 500

networks:
  penpot-net:
    name: penpot-network
    driver: bridge

volumes:
  penpot-pg-data:
  penpot-assets:
